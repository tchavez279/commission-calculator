<script type="text/babel" data-presets="react,typescript">
const { useState, useEffect, useMemo } = React;

type Mode = "basic" | "advanced" | "detailed";
type Currency = "USD" | "EUR" | "GBP" | "CAD" | "AUD" | "INR";
type Period = "hourly" | "weekly" | "biweekly" | "monthly" | "annual";
interface Tier { min: number; max: number | null; rate: number }
interface AddOn { id: string; name: string; qty: number; payout: number }
interface BonusTier { id: string; threshold: number; bonus: number }
interface Spiff { id: string; name: string; amount: number }
interface Scenario { id: string; name: string; mode: Mode; display: string; date: string; data: any }

const WEEKS_PER_YEAR = 52;
const HOURS_PER_WEEK_DEFAULT = 40;
function annualizeBase(amount: number, period: Period, hpw = HOURS_PER_WEEK_DEFAULT): number {
  switch (period) {
    case "hourly": return amount * hpw * WEEKS_PER_YEAR;
    case "weekly": return amount * WEEKS_PER_YEAR;
    case "biweekly": return amount * 26;
    case "monthly": return amount * 12;
    case "annual": return amount;
  }
}
function deAnnualize(annual: number, period: Period, hpw = HOURS_PER_WEEK_DEFAULT): number {
  switch (period) {
    case "hourly": return annual / (hpw * WEEKS_PER_YEAR);
    case "weekly": return annual / WEEKS_PER_YEAR;
    case "biweekly": return annual / 26;
    case "monthly": return annual / 12;
    case "annual": return annual;
  }
}
function uid() { return Math.random().toString(36).slice(2, 9); }

const currencySymbols: Record<Currency, string> = { USD: "$", EUR: "€", GBP: "£", CAD: "$", AUD: "$", INR: "₹" };
const presets: Record<string, { rate: number; label: string; emoji: string }> = {
  realestate: { rate: 3, label: "Real Estate 3%", emoji: "🏡" },
  saas: { rate: 10, label: "SaaS 10%", emoji: "💻" },
  retail: { rate: 5, label: "Retail 5%", emoji: "🛍️" },
  insurance: { rate: 15, label: "Insurance 15%", emoji: "🛡️" },
  auto: { rate: 25, label: "Auto 25%", emoji: "🚗" },
};

const fmt = (n: number, currency: Currency = "USD") => {
  if (!isFinite(n)) n = 0;
  try {
    return new Intl.NumberFormat(undefined, { style: "currency", currency, maximumFractionDigits: 2 }).format(n);
  } catch { return "$" + n.toFixed(2); }
};

function NumField({ value, onChange, placeholder = "0", min = 0, max, step }: {
  value: number; onChange: (n: number) => void; placeholder?: string;
  min?: number; max?: number; step?: number;
}) {
  const [text, setText] = useState(value === 0 ? "" : String(value));
  useEffect(() => {
    setText(value === 0 ? "" : String(value));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [value]);
  return (
    <input
      type="number"
      inputMode="decimal"
      value={text}
      placeholder={placeholder}
      min={min}
      max={max}
      step={step}
      onFocus={(e) => { if (e.target.value === "0") setText(""); }}
      onChange={(e) => {
        setText(e.target.value);
        const v = e.target.value === "" ? 0 : parseFloat(e.target.value);
        onChange(isNaN(v) ? 0 : v);
      }}
      className="border-0 outline-none bg-transparent w-full px-3 py-2.5 text-base font-medium text-foreground tabular-nums"
    />
  );
}

function CalculatorPage() {
  // Theme
  const [theme, setTheme] = useState<"light" | "dark">("light");
  useEffect(() => {
    const saved = (localStorage.getItem("mcc-theme") as "light" | "dark" | null) || "light";
    setTheme(saved);
    document.documentElement.classList.toggle("dark", saved === "dark");
  }, []);
  const toggleTheme = () => {
    const next = theme === "light" ? "dark" : "light";
    setTheme(next);
    document.documentElement.classList.toggle("dark", next === "dark");
    localStorage.setItem("mcc-theme", next);
  };

  const [mode, setMode] = useState<Mode>("basic");

  // Basic
  const [bSale, setBSale] = useState(0);
  const [bRate, setBRate] = useState(10);
  const [bDeals, setBDeals] = useState(1);

  // Advanced
  const [aSale, setASale] = useState(0);
  const [currency, setCurrency] = useState<Currency>("USD");
  const [planType, setPlanType] = useState<"flat" | "tiered">("flat");
  const [aRate, setARate] = useState(10);
  const [tiers, setTiers] = useState<Tier[]>([
    { min: 0, max: 50000, rate: 5 },
    { min: 50000, max: 100000, rate: 8 },
    { min: 100000, max: null, rate: 12 },
  ]);
  const [splitOn, setSplitOn] = useState(false);
  const [splitYou, setSplitYou] = useState(70);
  const [splitMgr, setSplitMgr] = useState(20);
  const [splitHouse, setSplitHouse] = useState(10);
  const [accelOn, setAccelOn] = useState(false);
  const [quotaAtt, setQuotaAtt] = useState(100);
  const [accelMult, setAccelMult] = useState(1.5);
  const [bonus, setBonus] = useState(0);
  const [baseOn, setBaseOn] = useState(false);
  const [hourly, setHourly] = useState(20);
  const [hpw, setHpw] = useState(40);
  const [otHours, setOtHours] = useState(0);
  const [otMult, setOtMult] = useState(1.5);
  const [dealsPerMonth, setDealsPerMonth] = useState(5);

  // Detailed (full previous calculator)
  const [dInputPeriod, setDInputPeriod] = useState<Period>("monthly");
  const [dOutPeriod, setDOutPeriod] = useState<Period>("monthly");
  const [dBasePay, setDBasePay] = useState(0);
  const [dBasePeriod, setDBasePeriod] = useState<Period>("hourly");
  const [dHpw, setDHpw] = useState(40);
  const [dOtHours, setDOtHours] = useState(0);
  const [dOtMult, setDOtMult] = useState(1.5);
  const [dUnits, setDUnits] = useState(0);
  const [dPerUnit, setDPerUnit] = useState(0);
  const [dRevenue, setDRevenue] = useState(0);
  const [dRevPct, setDRevPct] = useState(0);
  const [dAddons, setDAddons] = useState<AddOn[]>([{ id: uid(), name: "Protection plan", qty: 0, payout: 0 }]);
  const [dBonusTiers, setDBonusTiers] = useState<BonusTier[]>([
    { id: uid(), threshold: 10, bonus: 250 },
    { id: uid(), threshold: 25, bonus: 750 },
  ]);
  const [dSpiffs, setDSpiffs] = useState<Spiff[]>([{ id: uid(), name: "", amount: 0 }]);

  // Tax estimator (works for any mode)
  const [taxOn, setTaxOn] = useState(false);
  const [baseTaxPct, setBaseTaxPct] = useState(22);
  const [commTaxPct, setCommTaxPct] = useState(22);

  // Scenarios
  const [scenarios, setScenarios] = useState<Scenario[]>([]);
  useEffect(() => {
    try { setScenarios(JSON.parse(localStorage.getItem("mcc-scenarios") || "[]")); } catch {}
  }, []);
  const persistScenarios = (s: Scenario[]) => {
    setScenarios(s);
    localStorage.setItem("mcc-scenarios", JSON.stringify(s));
  };

  // Toast
  const [toast, setToast] = useState<string | null>(null);
  const showToast = (m: string) => {
    setToast(m);
    setTimeout(() => setToast(null), 1800);
  };

  // Compute
  const result = useMemo(() => {
    const cur: Currency = mode === "advanced" ? currency : "USD";
    const rows: { label: string; value: number; divider?: boolean }[] = [];
    let perDeal = 0, total = 0, monthly = 0, quarterly = 0, annual = 0, projection = false;
    let baseAmt = 0, commAmt = 0; // for tax split

    if (mode === "basic") {
      const c = bSale * (bRate / 100);
      perDeal = c;
      total = c * (bDeals || 1);
      commAmt = total;
      rows.push({ label: "Sale × rate", value: c });
      if ((bDeals || 1) > 1) rows.push({ label: `× ${bDeals} deals`, value: total, divider: true });
    } else if (mode === "advanced") {
      let baseComm = 0;
      if (planType === "tiered") {
        const sorted = [...tiers].sort((a, b) => a.min - b.min);
        for (const t of sorted) {
          const upper = t.max == null ? Infinity : t.max;
          if (aSale <= t.min) continue;
          const portion = Math.min(aSale, upper) - t.min;
          if (portion <= 0) continue;
          const c = portion * (t.rate / 100);
          baseComm += c;
          rows.push({ label: `${fmt(t.min, cur)} – ${t.max == null ? "∞" : fmt(t.max, cur)} @ ${t.rate}%`, value: c });
        }
      } else {
        baseComm = aSale * (aRate / 100);
        rows.push({ label: `Sale × ${aRate}%`, value: baseComm });
      }
      if (accelOn && quotaAtt > 100) {
        const extra = baseComm * (accelMult - 1);
        baseComm += extra;
        rows.push({ label: `Accelerator @ ${accelMult}x (over quota)`, value: extra });
      }
      let yourCut = baseComm;
      if (splitOn) {
        const totalSplit = (splitYou + splitMgr + splitHouse) || 100;
        yourCut = baseComm * (splitYou / totalSplit);
        rows.push({ label: `Your split (${splitYou}/${totalSplit})`, value: yourCut });
      }
      if (bonus > 0) { yourCut += bonus; rows.push({ label: "Bonus / SPIF", value: bonus }); }
      perDeal = yourCut;
      total = yourCut;
      commAmt = total;

      if (dealsPerMonth > 0 || baseOn) {
        projection = true;
        monthly = perDeal * dealsPerMonth;
        let baseAnnualVal = 0;
        if (baseOn) {
          const reg = hourly * hpw * 52;
          const ot = hourly * otMult * otHours * 52;
          baseAnnualVal = reg + ot;
          rows.push({ label: "Annual base + OT", value: baseAnnualVal });
        }
        quarterly = monthly * 3;
        annual = monthly * 12 + baseAnnualVal;
        // For projection mode, base/comm split for taxes uses annualized values
        baseAmt = baseAnnualVal;
        commAmt = monthly * 12;
      }
    } else {
      // DETAILED — full previous calculator
      // Scale = ratio between input frequency and selected output frequency
      const scale = annualizeBase(1, dInputPeriod, dHpw) / annualizeBase(1, dOutPeriod, dHpw);

      // Base pay (with optional OT) per output period
      let basePerPeriod = 0;
      if (dBasePay > 0) {
        const baseAnnual = annualizeBase(dBasePay, dBasePeriod, dHpw);
        const otAnnual = dBasePeriod === "hourly" ? (dBasePay * dOtMult * dOtHours * WEEKS_PER_YEAR) : 0;
        basePerPeriod = deAnnualize(baseAnnual + otAnnual, dOutPeriod, dHpw);
        if (basePerPeriod > 0) rows.push({ label: `Base pay${dOtHours > 0 && dBasePeriod === "hourly" ? " + OT" : ""}`, value: basePerPeriod });
      }

      // Units × per-unit
      const unitComm = dUnits * dPerUnit * scale;
      if (unitComm > 0) rows.push({ label: `${(dUnits * scale).toFixed(1)} units × ${fmt(dPerUnit, cur)}`, value: unitComm });

      // Revenue %
      const revComm = dRevenue * (dRevPct / 100) * scale;
      if (revComm > 0) rows.push({ label: `${fmt(dRevenue * scale, cur)} × ${dRevPct}%`, value: revComm });

      // Add-ons
      let addonComm = 0;
      dAddons.forEach((a) => {
        const v = a.qty * a.payout * scale;
        if (v > 0) {
          addonComm += v;
          rows.push({ label: `${a.name || "Add-on"}: ${(a.qty * scale).toFixed(1)} × ${fmt(a.payout, cur)}`, value: v });
        }
      });

      // Tiered bonus — highest threshold reached (based on scaled units)
      let bonusComm = 0;
      const scaledUnits = dUnits * scale;
      const sortedT = [...dBonusTiers].sort((a, b) => b.threshold - a.threshold);
      const reached = sortedT.find((t) => scaledUnits >= t.threshold && t.threshold > 0);
      if (reached && reached.bonus > 0) {
        bonusComm = reached.bonus;
        rows.push({ label: `Tier bonus (${reached.threshold}+ units)`, value: bonusComm });
      }

      // Spiffs
      let spiffComm = 0;
      dSpiffs.forEach((s) => {
        const v = s.amount * scale;
        if (v > 0) {
          spiffComm += v;
          rows.push({ label: `Spiff${s.name ? `: ${s.name}` : ""}`, value: v });
        }
      });

      const commPerPeriod = unitComm + revComm + addonComm + bonusComm + spiffComm;
      total = basePerPeriod + commPerPeriod;
      perDeal = total;
      baseAmt = basePerPeriod;
      commAmt = commPerPeriod;
    }

    // Tax estimator
    let baseTax = 0, commTax = 0, takeHome = 0;
    if (taxOn) {
      baseTax = baseAmt * (baseTaxPct / 100);
      commTax = commAmt * (commTaxPct / 100);
      takeHome = (baseAmt + commAmt) - baseTax - commTax;
    }

    const display = mode === "advanced" && projection ? annual : total;
    return { cur, rows, perDeal, total, monthly, quarterly, annual, projection, display, baseAmt, commAmt, baseTax, commTax, takeHome };
  }, [mode, bSale, bRate, bDeals, aSale, currency, planType, aRate, tiers, accelOn, quotaAtt, accelMult, splitOn, splitYou, splitMgr, splitHouse, bonus, baseOn, hourly, hpw, otHours, otMult, dealsPerMonth,
      dInputPeriod, dOutPeriod, dBasePay, dBasePeriod, dHpw, dOtHours, dOtMult, dUnits, dPerUnit, dRevenue, dRevPct, dAddons, dBonusTiers, dSpiffs,
      taxOn, baseTaxPct, commTaxPct]);

  const applyPreset = (key: string) => {
    const p = presets[key]; if (!p) return;
    if (mode === "basic") setBRate(p.rate);
    else { setPlanType("flat"); setARate(p.rate); }
  };

  const reset = () => {
    if (mode === "basic") { setBSale(0); setBRate(10); setBDeals(1); }
    else {
      setASale(0); setPlanType("flat"); setARate(10); setSplitOn(false); setAccelOn(false);
      setBaseOn(false); setBonus(0); setDealsPerMonth(5);
    }
    showToast("Reset ✓");
  };

  const saveScenario = () => {
    const name = window.prompt("Name this scenario:", `Scenario ${scenarios.length + 1}`);
    if (!name) return;
    const data = mode === "basic"
      ? { sale: bSale, rate: bRate, deals: bDeals }
      : { sale: aSale, currency, planType, rate: aRate, tiers, splitOn, splitYou, splitMgr, splitHouse,
          accelOn, quotaAtt, accelMult, bonus, baseOn, hourly, hpw, otHours, otMult, dealsPerMonth };
    const next = [{
      id: Math.random().toString(36).slice(2),
      name, mode, data,
      display: fmt(result.display, result.cur),
      date: new Date().toLocaleDateString(),
    }, ...scenarios].slice(0, 24);
    persistScenarios(next);
    showToast("Saved ✓");
  };

  const loadScenario = (s: Scenario) => {
    setMode(s.mode);
    if (s.mode === "basic") {
      setBSale(s.data.sale || 0); setBRate(s.data.rate || 10); setBDeals(s.data.deals || 1);
    } else {
      const d = s.data;
      setASale(d.sale || 0); setCurrency(d.currency || "USD"); setPlanType(d.planType || "flat");
      setARate(d.rate || 10); setTiers(d.tiers || tiers);
      setSplitOn(!!d.splitOn); setSplitYou(d.splitYou ?? 70); setSplitMgr(d.splitMgr ?? 20); setSplitHouse(d.splitHouse ?? 10);
      setAccelOn(!!d.accelOn); setQuotaAtt(d.quotaAtt ?? 100); setAccelMult(d.accelMult ?? 1.5);
      setBonus(d.bonus || 0); setBaseOn(!!d.baseOn); setHourly(d.hourly ?? 20); setHpw(d.hpw ?? 40);
      setOtHours(d.otHours || 0); setOtMult(d.otMult ?? 1.5); setDealsPerMonth(d.dealsPerMonth ?? 5);
    }
    showToast("Loaded ✓");
  };

  const share = async () => {
    const payload = btoa(encodeURIComponent(JSON.stringify({
      m: mode,
      b: { sale: bSale, rate: bRate, deals: bDeals },
      a: { sale: aSale, currency, planType, rate: aRate, dealsPerMonth },
    })));
    const url = `${location.origin}${location.pathname}#s=${payload}`;
    try { await navigator.clipboard.writeText(url); showToast("Link copied! 🔗"); }
    catch { window.prompt("Copy this link:", url); }
  };

  const copyResult = async () => {
    try { await navigator.clipboard.writeText(`My commission: ${fmt(result.display, result.cur)}`); showToast("Copied! 📋"); }
    catch { showToast("Copy failed"); }
  };

  // Card classes
  const card = "bg-card border border-border rounded-xl p-6 shadow-sm";
  const inputGroup = "flex items-stretch border border-input rounded-lg bg-card overflow-hidden focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition";
  const fix = "inline-flex items-center px-3 bg-muted text-muted-foreground font-semibold text-sm";

  return (
    <div className="min-h-screen bg-background text-foreground">
      {/* HEADER */}
      <header className="sticky top-0 z-50 border-b border-border backdrop-blur bg-background/80">
        <div className="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <span className="w-10 h-10 rounded-xl bg-gradient-gold text-foreground font-extrabold text-xl shadow-gold border-2 border-white/50 flex items-center justify-center" style={{ fontFamily: "Georgia, 'Times New Roman', serif" }}>$</span>
            <span className="font-bold text-base sm:text-lg tracking-tight">My Commission Calculator</span>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={toggleTheme} aria-label="Toggle theme" className="h-10 w-10 rounded-lg hover:bg-muted transition flex items-center justify-center text-lg">
              {theme === "light" ? "☀️" : "🌙"}
            </button>
            <button onClick={share} className="h-10 px-4 rounded-lg hover:bg-muted transition text-sm font-semibold">🔗 Share</button>
          </div>
        </div>
      </header>

      {/* HERO */}
      <section className="text-center py-12 sm:py-16 px-5">
        <span className="inline-block px-3.5 py-1.5 rounded-full bg-muted text-primary text-xs font-semibold border border-border mb-4">💰 Free • No signup • Works offline</span>
        <h1 className="text-4xl sm:text-5xl lg:text-6xl font-extrabold tracking-tight leading-tight max-w-3xl mx-auto">
          Know exactly <span className="text-gradient-gold">what you'll earn.</span>
        </h1>
        <p className="text-muted-foreground text-base sm:text-lg mt-4 max-w-xl mx-auto">
          The fastest commission calculator on the web. Switch to <strong>Advanced</strong> for tiered rates, splits, accelerators, bonuses and annual projections.
        </p>
      </section>

      {/* MAIN */}
      <main className="max-w-6xl mx-auto px-5 pb-12 grid gap-6 lg:grid-cols-[1.3fr_1fr]">
        {/* INPUTS */}
        <section className={card}>
          {/* Tabs */}
          <div className="inline-flex p-1 bg-muted rounded-xl border border-border mb-5 flex-wrap">
            {(["basic", "detailed", "advanced"] as Mode[]).map((m) => (
              <button
                key={m}
                onClick={() => setMode(m)}
                className={`px-4 sm:px-5 py-2 rounded-lg font-semibold transition text-sm sm:text-base ${mode === m ? "bg-card text-foreground shadow-sm" : "text-muted-foreground"}`}
              >
                {m === "basic" ? "⚡ Basic" : m === "detailed" ? "🧮 Detailed" : "🚀 Advanced"}
              </button>
            ))}
          </div>

              className="text-sm px-3 py-1.5 border border-border rounded-lg hover:bg-muted">Clear all</button>
          )}
        </div>
        {scenarios.length === 0 ? (
          <p className="text-center text-muted-foreground text-sm py-6 bg-card border border-dashed border-border rounded-xl">No saved scenarios yet. Save one to compare side-by-side.</p>
        ) : (
          <div className="grid gap-3.5 sm:grid-cols-2 lg:grid-cols-3">
            {scenarios.map((s, i) => (
              <div key={s.id} className="bg-card border border-border rounded-xl p-4 shadow-sm">
                <h4 className="font-semibold">{s.name}</h4>
                <div className="text-2xl font-extrabold text-primary tabular-nums my-1.5">{s.display}</div>
                <div className="text-xs text-muted-foreground">{s.mode === "basic" ? "⚡ Basic" : "🚀 Advanced"} · {s.date}</div>
                <div className="flex gap-1.5 mt-2.5">
                  <button onClick={() => loadScenario(s)} className="flex-1 h-8 text-xs border border-border rounded-lg hover:bg-muted font-semibold">Load</button>
                  <button onClick={() => persistScenarios(scenarios.filter((_, idx) => idx !== i))} className="flex-1 h-8 text-xs border border-border rounded-lg hover:bg-muted font-semibold">Delete</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </section>

      {/* INFO */}
      <section className="max-w-6xl mx-auto px-5 pb-16">
        <div className="grid gap-4 sm:grid-cols-3">
          {[
            { icon: "⚡", title: "Lightning fast", body: "Calculations update live as you type. No reloads." },
            { icon: "🔒", title: "100% private", body: "Everything runs in your browser. Nothing sent to a server." },
            { icon: "🚀", title: "Pro-grade math", body: "Tiered, splits, accelerators, bonuses, draw and projection." },
          ].map((c) => (
            <div key={c.title} className="bg-card border border-border rounded-xl p-6 text-center">
              <div className="text-3xl mb-2">{c.icon}</div>
              <h3 className="font-bold mb-1">{c.title}</h3>
              <p className="text-sm text-muted-foreground">{c.body}</p>
            </div>
          ))}
        </div>
      </section>

      <footer className="border-t border-border py-6 text-center text-sm text-muted-foreground">
        © {new Date().getFullYear()} My Commission Calculator · Built for sales pros 💼
      </footer>

      {/* TOAST */}
      {toast && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-foreground text-background px-5 py-3 rounded-full font-semibold text-sm shadow-2xl z-50">
          {toast}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<CalculatorPage />);
</script>
</body>
</html>
